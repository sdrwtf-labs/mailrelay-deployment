name: Deploy Mail Relay

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Execute deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 10.0.30.20
          username: sd
          key: ${{ secrets.DOCKER_01 }}
          script: |
            mkdir -p /opt/mailrelay
            cd /opt/mailrelay
            git checkout main
            git pull origin main
            chmod +x wrapper.sh
            docker compose up -d
            docker system prune -f
